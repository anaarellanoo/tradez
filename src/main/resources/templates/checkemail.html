<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title>Check Email</title>
    <link rel="stylesheet" th:href="@{/css/authForm.css}">
</head>
<body>
<div layout:fragment="content">
    <div class="auth-container">
        <!-- Logo -->
        <div class="auth-logo">
            <img th:src="@{/css/images/logo.png}" alt="Tradez Logo"/>
        </div>

        <!-- Email Card -->
       
        <div class="auth-card email-card"> 
            <h1>TRADEZ</h1>
            <h1>Enter Your Email</h1>
            <form th:action="@{/tradez/checkemail}" method="post">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
                <button type="submit">Continue</button>
            </form>
            <p>We'll redirect you to login if your email exists, or to register if not.</p>
        </div>
    </div>
</div>
</body>
</html>
