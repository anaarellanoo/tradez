<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{mainlayout}">

<head>
    <title th:text="${seller.name + ' - Profile'}"></title>
    <link rel="stylesheet" th:href="@{/css/profile.css}" />
    <link rel="stylesheet" th:href="@{/css/itemCard.css}" />
</head>

<body>
    <div layout:fragment="content" class="profile-container">

        <!-- Profile Card -->
        <div class="seller-card">
            <img th:src="${seller.profileImageURL ?: '/css/images/default-profile.png'}" class="profile-lg" />
            <div>
                <h1 th:text="${seller.name + ' ' + seller.lastName}">Seller Name</h1>
                <p class="text-muted">
                    <i class="fas fa-map-marker-alt"></i>
                    <span th:text="${seller.location}">Location</span>
                </p>
                <p class="text-muted">
                    Member since
                    <span th:text="${#temporals.format(seller.createdAt, 'MMMM yyyy')}">Date</span>
                </p>
                <a th:if="${isOwnProfile}" href="/tradez/settings" class="btn-main btn-secondary"
                    style="width: auto">Edit My Profile</a>
            </div>
        </div>

        <!-- Reviews -->
        <div class="reviews-given-section">
            <h3 style="margin-top: 30px">Reviews</h3>
            <div th:if="${#lists.isEmpty(reviews)}">
                <p class="text-muted">No reviews yet for this trader.</p>
            </div>
            <div th:each="rev : ${reviews}" class="review-card">
                <strong th:text="${rev.reviewerName}">Reviewer</strong>
                <div class="star-rating">
                    <span th:each="i : ${#numbers.sequence(1, 5)}" th:text="${rev.rating >= i} ? '★' : '☆'"></span>
                </div>
                <p th:text="${rev.comment}" style="margin-top: 5px"></p>
            </div>
        </div>

        <!-- Active Listings -->
        <div class="user-items-section">
            <h3 style="margin-top: 40px">Active Listings</h3>
            <hr />
            <div class="items-grid">
                <div th:each="item : ${items}">
                    <div th:replace="~{fragments/itemCard :: itemCard(item=${item})}"></div>
                </div>
                <div th:if="${#lists.isEmpty(items)}" style="text-align: center; grid-column: 1 / -1; padding: 40px">
                    <p class="text-muted">This user has no active listings.</p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
