<div th:fragment="addItemCard">
    <div id="addItemModal" class="modal">
        <div class="modal-content">

            <span class="close-btn" onclick="closeAddItemForm()">&times;</span>

            <h2
                th:text="${item != null && item.itemId != null && item.itemId != 0} ? 'Edit Listing' : 'Create a Listing'">
                Create a Listing
            </h2>

            <form th:action="${item.itemId != null} ? @{/tradez/update} : @{/tradez/save}" th:object="${item}"
                method="post" enctype="multipart/form-data">

                <input type="hidden" th:field="*{itemId}" />
                <input type="hidden" th:field="*{userId}" />

                <!-- IMAGE UPLOAD -->
                <div class="form-group">
                    <label>Item Image</label>

                    <!-- existing image -->
                    <div id="existingImagePreview">
                        <img th:if="${item.imageUrl != null}" th:src="${item.imageUrl}" class="preview-image" />
                    </div>

                    <!-- new preview -->
                    <div id="imagePreviewContainer"></div>

                    <input type="file" id="imageFile" name="imageFile" accept="image/*" onchange="previewImage()" />
                </div>

                <!-- BASIC INFO -->
                <h3>What are you offering?</h3>

                <div class="form-group">
                    <input type="text" th:field="*{itemName}" placeholder="Item Title" required />
                </div>

                <div class="form-group">
                    <textarea th:field="*{description}" placeholder="Describe your item..." required></textarea>
                </div>

                <!-- CATEGORY + CONDITION -->
                <div class="form-row">

                    <div class="form-group">
                        <select th:field="*{categoryId}" required>
                            <option value="">Select Category</option>
                            <option th:each="cat : ${categories}" th:value="${cat.categoryId}"
                                th:text="${cat.categoryName}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <select th:field="*{conditionId}" required>
                            <option value="">Select Condition</option>
                            <option th:each="cond : ${conditions}" th:value="${cond.conditionId}"
                                th:text="${cond.conditionName + ': ' + cond.description}">
                            </option>
                        </select>
                    </div>

                </div>

                <!-- TRADE INFO -->
                <h3>What would you like in return?</h3>

                <div class="form-group">
                    <select th:field="*{desiredCategoryId}" required>
                        <option value="">Select Desired Category</option>
                        <option th:each="cat : ${categories}" th:value="${cat.categoryId}"
                            th:text="${cat.categoryName}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <textarea th:field="*{desiredReturn}" placeholder="Anything you'd like..." required></textarea>
                </div>

                <!-- LOGISTICS -->
                <h3>Logistics</h3>

                <div class="radio-group">

                    <label class="radio-option">
                        <input type="radio" th:field="*{isOnline}" value="false" required>
                        <input type="radio" th:field="*{isOnline}" value="false">
                        📍 Local Meetup
                    </label>

                    <label class="radio-option">
                        <input type="radio" th:field="*{isOnline}" value="true">
                        🌐 Online Trade
                    </label>

                </div>

                <button type="submit" class="submit-btn"
                    th:text="${item.itemId != null && item.itemId != 0} ? 'Save Changes' : 'Post Listing'">
                    Post Listing
                </button>

            </form>
        </div>
    </div>

    <script>
        function previewImage() {
            const input = document.getElementById('imageFile');
            const preview = document.getElementById('imagePreviewContainer');

            preview.innerHTML = '';

            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = e => {
                const img = document.createElement('img');
                img.src = e.target.result;
                img.className = "preview-image";
                preview.appendChild(img);
            };

            reader.readAsDataURL(file);
        }
    </script>
</div>
